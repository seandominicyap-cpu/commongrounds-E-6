{% extends "base.html" %}
{% block body %}
<h2>Set New Password</h2>

{% if validlink %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Change password</button>
</form>

{% else %}
<p>The reset link is invalid or has expired.</p>
<a href="{% url 'password_reset' %}">Request a new reset link</a>
{% endif %}
{% endblock %}
