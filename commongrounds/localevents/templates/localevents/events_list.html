{% extends 'base.html' %} {% block heading_text %} Event List {% endblock%} {% block content %}
<ul>
    {% for event in events %}
    <li>
        <a href="{{ event.get_absolute_url }}">{{ event.title }}</a>
        ({{ event.start_time|date:"Y-m-d"}})
    </li>
    {% empty %}
    <li>No events found.</li>

    {% endfor %}
</ul>
{% endblock %}
