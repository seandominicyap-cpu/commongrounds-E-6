{% extends 'diyprojects/base.html' %}

{% block content %}
    <style>
        .django-form p label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .django-form p input, 
        .django-form p textarea, 
        .django-form p select {
            display: block;
            width: 100%;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
        }
    </style>

    <div class="container mt-4" style="max-width: 800px;">
        <h2>Create a New DIY Project</h2>
        <p class="text-muted">Role: {{ request.user.profile.role }}</p>
        <hr>
        
        <form method="post" class="shadow-sm p-4 bg-light rounded">
            {% csrf_token %}
            
            <div class="django-form">
                {{ form.as_p }}
            </div>
            
            <div class="form-actions mt-4">
                <button type="submit" class="btn btn-primary">Publish Project</button>
                <a href="{% url 'diyprojects:project_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
{% endblock %}
