{% extends 'base.html' %}

{% block content %}
    <h2>{% if object %}Edit{% else %}Create New{% endif %} Project</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Project</button>
    </form>
    
    <br>
    <a href="{% url 'project_list' %}">Cancel and Go Back</a>
{% endblock %}
