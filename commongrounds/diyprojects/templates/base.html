<!DOCTYPE html>
<html>
<head>
    <title>DIY Project Hub</title>
</head>
<body>
    <nav>
        <a href="{% url 'diyprojects:project_list' %}">Home</a> |
        
        {% if user.is_authenticated %}
            <strong>{{ user.username }} ({{ user.profile.role }})</strong> |
            
            {% if user.profile.role == "Project Creator" %}
                <a href="{% url 'diyprojects:project_create' %}">Add New Project</a> |
            {% endif %}
            
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
