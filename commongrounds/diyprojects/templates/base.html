<!DOCTYPE html>
<html>
<head>
    <title>DIY Project Hub</title>
</head>
<body>
    <nav>
        <a href="{% url 'project_list' %}">Home</a> |
        {% if user.is_authenticated %}
            <span>Hello, {{ user.username }} ({{ user.profile.role }})</span> |
            
            {% if user.profile.role == "Project Creator" %}
                <a href="{% url 'project_add' %}">Create Project</a> |
            {% endif %}
            
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
